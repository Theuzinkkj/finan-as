<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Preview — Ícones Atlas</title>
  <style>
    body { background: #1a1a1a; font-family: Inter, sans-serif; color: #ccc; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 48px; }
    h1 { color: #fff; font-size: 18px; margin: 0; }
    .row { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; justify-content: center; }
    .card { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .name  { font-size: 14px; color: #aaa; }
    img { image-rendering: crisp-edges; display: block; }
    .divider { width: 1px; height: 120px; background: #333; }
  </style>
</head>
<body>
  <h1>Comparação de Ícones — Atlas</h1>

  <div class="row">

    <!-- Opção 1: atual -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:24px;">
      <span class="name">Opção 1 — Globo + "A" (cyan-green)</span>
      <div class="row">
        <div class="card">
          <img src="favicon.svg" width="16" height="16">
          <span class="label">16px</span>
        </div>
        <div class="card">
          <img src="favicon.svg" width="32" height="32">
          <span class="label">32px</span>
        </div>
        <div class="card">
          <img src="favicon.svg" width="64" height="64">
          <span class="label">64px</span>
        </div>
        <div class="card">
          <img src="favicon.svg" width="128" height="128">
          <span class="label">128px</span>
        </div>
        <div class="card">
          <img src="favicon.svg" width="256" height="256">
          <span class="label">256px</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Opção 2: alternativa -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:24px;">
      <span class="name">Opção 2 — "A" sólido dourado</span>
      <div class="row">
        <div class="card">
          <img src="favicon-alt.svg" width="16" height="16">
          <span class="label">16px</span>
        </div>
        <div class="card">
          <img src="favicon-alt.svg" width="32" height="32">
          <span class="label">32px</span>
        </div>
        <div class="card">
          <img src="favicon-alt.svg" width="64" height="64">
          <span class="label">64px</span>
        </div>
        <div class="card">
          <img src="favicon-alt.svg" width="128" height="128">
          <span class="label">128px</span>
        </div>
        <div class="card">
          <img src="favicon-alt.svg" width="256" height="256">
          <span class="label">256px</span>
        </div>
      </div>
    </div>

  </div>

  <!-- 512 lado a lado -->
  <div class="row">
    <div class="card">
      <img src="favicon.svg" width="512" height="512">
      <span class="label">Opção 1 — 512px</span>
    </div>
    <div class="card">
      <img src="favicon-alt.svg" width="512" height="512">
      <span class="label">Opção 2 — 512px</span>
    </div>
  </div>

</body>
</html>
