<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="28%" r="80%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="55%"  stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1448"/>
    </radialGradient>
    <!-- Reflexo sutil no topo para dar profundidade -->
    <radialGradient id="shine" cx="50%" cy="0%" r="60%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fundo roxo gradiente -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Reflexo suave no topo -->
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- "A" branco, limpo e geométrico -->
  <path fill-rule="evenodd" fill="rgba(255,255,255,0.95)"
    d="M256,96 L400,432 L344,432 L312,328 L200,328 L168,432 L112,432 Z
       M256,160 L312,328 L200,328 Z"/>
</svg>
