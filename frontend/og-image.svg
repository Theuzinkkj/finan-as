<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="15%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="80%" cy="15%" r="45%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#g3)"/>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="24" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Gem icon -->
  <text x="140" y="295" font-family="Arial, sans-serif" font-size="96" text-anchor="middle" dominant-baseline="middle">💎</text>

  <!-- Logo text -->
  <text x="210" y="268" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="#f1f5f9" letter-spacing="-2">Atlas</text>

  <!-- Divider line -->
  <rect x="140" y="320" width="920" height="1.5" fill="rgba(255,255,255,0.08)"/>

  <!-- Main headline -->
  <text x="140" y="390" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="#f1f5f9" letter-spacing="-1.5">Pare de perder dinheiro</text>
  <text x="140" y="452" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)" letter-spacing="-1.5">sem saber por quê.</text>

  <!-- Subtitle -->
  <text x="140" y="512" font-family="Arial, sans-serif" font-size="26" fill="#94a3b8">Controle financeiro inteligente — 100% gratuito para começar.</text>

  <!-- Trust badges -->
  <rect x="140" y="554" width="200" height="36" rx="18" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.28)" stroke-width="1"/>
  <text x="240" y="578" font-family="Arial, sans-serif" font-size="18" fill="#818cf8" text-anchor="middle" font-weight="600">✓ Sem cartão</text>

  <rect x="356" y="554" width="190" height="36" rx="18" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.28)" stroke-width="1"/>
  <text x="451" y="578" font-family="Arial, sans-serif" font-size="18" fill="#818cf8" text-anchor="middle" font-weight="600">✓ Sem instalação</text>

  <rect x="562" y="554" width="210" height="36" rx="18" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.28)" stroke-width="1"/>
  <text x="667" y="578" font-family="Arial, sans-serif" font-size="18" fill="#818cf8" text-anchor="middle" font-weight="600">✓ IA integrada</text>

  <!-- CTA button -->
  <rect x="860" y="548" width="230" height="44" rx="14" fill="#6366f1"/>
  <text x="975" y="576" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="700">Testar agora →</text>
</svg>
