name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Smoke Test ──────────────────────────────────────────────────────
  test:
    name: Lint & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check syntax (Node --check)
        working-directory: backend
        run: node --check server.js

      - name: Verify required env vars listed in server
        working-directory: backend
        run: |
          grep -q "SUPABASE_URL"  server.js
          grep -q "SUPABASE_KEY"  server.js
          grep -q "GROQ_KEY"      server.js
          echo "Todas as variáveis obrigatórias estão referenciadas."

      - name: Check frontend JS syntax
        run: |
          for f in frontend/js/*.js; do
            node --check "$f" && echo "OK: $f"
          done

  # ── Deploy to Railway ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service atlas-finance --detach
